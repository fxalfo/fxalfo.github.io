<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Precios al Público</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        :root {
            --primary-color: #0ea5e9;
            --bg-color: #f0fdfa;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --price-color: #059669;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        /* Sección de carga de archivo */
        .upload-section {
            background: #e0f2fe;
            padding: 1rem;
            border-radius: 8px;
            border: 2px dashed #7dd3fc;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .btn-cloud {
            background-color: #f59e0b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            margin-bottom: 10px;
        }

        .btn-cloud:active { background-color: #d97706; }

        input[type="file"] { display: none; }

        .file-label {
            cursor: pointer;
            font-weight: bold;
            color: #0284c7;
            padding: 5px 10px;
            display: inline-block;
        }

        /* Controles de búsqueda */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            text-align: center;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }

        .btn-scan {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Área de cámara */
        #reader {
            width: 100%;
            margin-bottom: 1.5rem;
            display: none;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        /* Tarjeta de Resultados */
        .result-card {
            display: none;
            background: #ecfdf5;
            border: 2px solid #34d399;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .product-desc {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #064e3b;
            text-transform: uppercase;
        }

        .sale-price-container {
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .price-label {
            display: block;
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .price-value {
            display: block;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--price-color);
        }

        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 1rem;
            display: none;
        }

        .db-status {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Verificador de Precios</h1>

    <div class="db-status" id="dbStatus">Esperando base de datos...</div>

    <div class="upload-section">
        <button id="btnSyncCloud" class="btn-cloud">☁️ Sincronizar desde la Nube</button>
        <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 10px;">— o cargar archivo localmente —</div>
        
        <label for="csvFileInput" class="file-label">📥 Cargar archivo CSV</label>
        <input type="file" id="csvFileInput" accept=".csv">
    </div>

    <div id="reader"></div>

    <div class="input-group">
        <input type="text" id="searchInput" placeholder="Escanear o teclear código..." inputmode="numeric" autocomplete="off">
        <button class="btn-scan" id="btnScan" title="Activar Cámara">📷</button>
    </div>

    <div id="resultCard" class="result-card">
        <div class="product-desc" id="resDesc">Nombre del Producto</div>
        <div class="sale-price-container">
            <span class="price-label">Precio al Público</span>
            <span class="price-value" id="resSale">$0.00</span>
        </div>
    </div>

    <div id="errorMsg" class="error-msg">⚠️ Código no encontrado en la base de datos</div>
</div>

<script>
    // ==========================================
    // INSERTA TU ENLACE DE GOOGLE SHEETS AQUÍ ABAJO
    // ==========================================
    const CLOUD_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGqkVOs39LZVXDFGrZa9SNb3f4DqorXyFv7RXMTbV2XO0Aew313GxCHuiierYQWOTwXAYZx1ZGHfeh/pub?output=csv"; 
    // ==========================================

    let inventory = [];
    let html5QrcodeScanner = null;
    let isScanning = false;

    const fileInput = document.getElementById('csvFileInput');
    const searchInput = document.getElementById('searchInput');
    const resultCard = document.getElementById('resultCard');
    const errorMsg = document.getElementById('errorMsg');
    const dbStatus = document.getElementById('dbStatus');
    const btnScan = document.getElementById('btnScan');
    const btnSyncCloud = document.getElementById('btnSyncCloud');
    const readerDiv = document.getElementById('reader');

    window.onload = function() {
        const savedData = localStorage.getItem('inventoryApp_Data');
        if (savedData) {
            inventory = JSON.parse(savedData);
            dbStatus.textContent = `✅ Base de datos lista (${inventory.length} artículos)`;
            searchInput.focus();
        }
    };

    // FUNCIÓN DE SINCRONIZACIÓN EN LA NUBE
    btnSyncCloud.addEventListener('click', function() {
        if(CLOUD_CSV_URL === "PEGAR_TU_ENLACE_AQUI") {
            alert("Aún no has pegado tu enlace de Google Sheets en el código HTML.");
            return;
        }

        dbStatus.textContent = "⏳ Conectando con la nube...";
        
        // Petición al servidor de Google
        fetch(CLOUD_CSV_URL)
            .then(response => {
                if (!response.ok) throw new Error('Error al conectar con Google Sheets');
                return response.text();
            })
            .then(csvText => {
                parseCSV(csvText, true);
            })
            .catch(error => {
                console.error(error);
                dbStatus.textContent = "❌ Error de conexión.";
                alert("No se pudo descargar. Verifica que el enlace provenga de 'Publicar en la web' y tengas internet.");
            });
    });

    // Carga manual (respaldo sin internet)
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            parseCSV(e.target.result, false);
        };
        reader.readAsText(file, 'ISO-8859-1'); 
    });

    function parseCSV(csvText, fromCloud) {
        const lines = csvText.split(/\r\n|\n/);
        const newInventory = [];

        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            const parts = line.split(',');
            if (parts.length >= 4) {
                newInventory.push({ 
                    code: parts[0].trim(), 
                    desc: parts[1].trim(), 
                    sale: parts[3].trim()
                });
            }
        }
        
        inventory = newInventory;
        
        try {
            localStorage.setItem('inventoryApp_Data', JSON.stringify(inventory));
            dbStatus.textContent = `✅ Actualizado (${inventory.length} artículos)`;
            if(fromCloud) alert('¡Inventario sincronizado desde la nube con éxito!');
            else alert('Archivo local cargado correctamente.');
            
            searchInput.value = '';
            searchInput.focus();
        } catch (e) {
            dbStatus.textContent = `⚠️ Datos temporales (${inventory.length} artículos)`;
        }
    }

    // Buscador
    function searchProduct(query) {
        if (!query) {
            resultCard.style.display = 'none';
            errorMsg.style.display = 'none';
            return;
        }

        const product = inventory.find(item => item.code === query);
        
        if (product) {
            document.getElementById('resDesc').textContent = product.desc;
            document.getElementById('resSale').textContent = product.sale;
            resultCard.style.display = 'block';
            errorMsg.style.display = 'none';
        } else {
            resultCard.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    }

    searchInput.addEventListener('input', (e) => searchProduct(e.target.value.trim()));
    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            this.select();
        }
    });

    // Escáner Cámara
    btnScan.addEventListener('click', function() {
        if (isScanning) stopScanner();
        else startScanner();
    });

    function startScanner() {
        readerDiv.style.display = 'block';
        isScanning = true;
        btnScan.textContent = '❌'; 
        btnScan.style.backgroundColor = '#ef4444';

        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 150 } };
        
        html5QrcodeScanner.start({ facingMode: "environment" }, config, (decodedText) => {
            searchInput.value = decodedText;
            searchProduct(decodedText);
        }).catch(err => {
            alert("No se pudo iniciar la cámara.");
            stopScanner();
        });
    }

    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                readerDiv.style.display = 'none';
                html5QrcodeScanner.clear();
            }).catch(console.error);
        }
        isScanning = false;
        btnScan.textContent = '📷';
        btnScan.style.backgroundColor = 'var(--primary-color)';
    }
</script>

</body>
</html>
