<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GestureDrawing Studio Pro 2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500&family=Montserrat:wght@600;700&display=swap');
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --text-main: #ffffff;
            --accent: #f97316; --accent-dark: #ea580c; --gray-dark: #334155;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: var(--text-main); font-family: 'Fira Sans', sans-serif; overflow: hidden; }
        
        /* BARRA DE PROGRESO SUPERIOR */
        #top-progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--gray-dark); z-index: 100; display: none; }
        #top-progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        #control-panel { background: var(--panel-bg); padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; position: relative; z-index: 50; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; color: #a0a0a0; text-transform: uppercase; font-family: 'Montserrat'; }
        select, input, button { padding: 10px; border-radius: 4px; border: 1px solid #333; background: #2a2a2a; color: #fff; }
        button { background: var(--accent); font-weight: 700; cursor: pointer; border: none; }
        button:hover { background: var(--accent-dark); }
        
        #display-area { flex-grow: 1; height: calc(100vh - 100px); display: flex; justify-content: center; align-items: center; position: relative; }
        #current-image { max-width: 100%; max-height: 100%; display: none; }
        
        #stats-overlay { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; font-family: 'Montserrat'; font-size: 0.8rem; display: none; pointer-events: none; }
        .orange { color: var(--accent); }
    </style>
</head>
<body>
    <div id="top-progress-container"><div id="top-progress-bar"></div></div>

    <div id="control-panel">
        <div class="control-group">
            <label>1. Cargar Local</label>
            <input type="file" id="local-input" webkitdirectory directory multiple>
        </div>
        <div class="control-group">
            <label>2. Google Drive</label>
            <button onclick="onDriveClick()" style="background: #4285F4;">Conectar Drive</button>
        </div>
        <div class="control-group">
            <label>3. Tiempo</label>
            <select id="time-select">
                <option value="30">30 Segundos</option>
                <option value="60">1 Minuto</option>
                <option value="300">5 Minutos</option>
                <option value="600">10 Minutos</option>
            </select>
        </div>
        <div class="control-group">
            <button id="start-btn" disabled>Iniciar Sesión</button>
        </div>
    </div>

    <div id="display-area">
        <div id="stats-overlay">
            Tiempo Sesión: <span id="total-time" class="orange">00:00</span> | 
            Imagen: <span id="img-count" class="orange">0/0</span>
        </div>
        <img id="current-image">
    </div>

    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>

   <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // CONFIGURACIÓN DRIVE
        // IMPORTANTE: Asegúrate de poner aquí tu API Key real (que empieza con AIza...)
        const API_KEY = 'gesturedrawingv2'; 
        const CLIENT_ID = '889577351081-kpju8neuv124s77ck26egbod3ka5h8gt.apps.googleusercontent.com';
        const APP_ID = '889577351081'; // Son los números antes del guion en tu Client ID
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

        let files = [];
        let currentIndex = 0;
        let sessionStartTime, imageStartTime;
        let timerInterval, progressInterval, sessionInterval;

        const imgElement = document.getElementById('current-image');
        const startBtn = document.getElementById('start-btn');
        const progressBar = document.getElementById('top-progress-bar');
        const progressContainer = document.getElementById('top-progress-container');

        // Variables de Google
        let tokenClient;
        let accessToken = null;
        let pickerInited = false;
        let gisInited = false;

        // Inicializar Google APIs
        function gapiLoaded() {
            gapi.load('client:picker', () => {
                gapi.client.load('drive', 'v3');
                pickerInited = true;
            });
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // Se define dinámicamente al hacer clic
            });
            gisInited = true;
        }

        // --- LÓGICA DE GOOGLE DRIVE ---
        function onDriveClick() {
            if (!pickerInited || !gisInited) {
                alert("Las APIs de Google aún están cargando. Intenta en un segundo.");
                return;
            }

            tokenClient.callback = async (response) => {
                if (response.error !== undefined) {
                    throw (response);
                }
                accessToken = response.access_token;
                createPicker();
            };

            if (accessToken === null) {
                // Pide al usuario que inicie sesión
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                // Ya tiene token, omite el login
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        function createPicker() {
            // Configurar la vista para ver solo imágenes
            const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
                .setMimeTypes('image/png,image/jpeg,image/jpg,image/webp')
                .setIncludeFolders(true);

            const picker = new google.picker.PickerBuilder()
                .enableFeature(google.picker.Feature.NAV_HIDDEN)
                .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
                .setDeveloperKey(API_KEY)
                .setAppId(APP_ID)
                .setOAuthToken(accessToken)
                .addView(view)
                .addView(new google.picker.DocsUploadView())
                .setCallback(pickerCallback)
                .build();
            picker.setVisible(true);
        }

        async function pickerCallback(data) {
            if (data.action === google.picker.Action.PICKED) {
                const documents = data[google.picker.Response.DOCUMENTS];
                
                startBtn.textContent = "Cargando imágenes...";
                
                // Extraer y procesar cada imagen seleccionada
                for (let i = 0; i < documents.length; i++) {
                    const fileId = documents[i][google.picker.Document.ID];
                    const fileName = documents[i][google.picker.Document.NAME];
                    
                    try {
                        // Obtener los datos de la imagen usando el token
                        const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                            headers: {
                                'Authorization': 'Bearer ' + accessToken
                            }
                        });
                        
                        const blob = await response.blob();
                        const objectUrl = URL.createObjectURL(blob);
                        
                        files.push({ url: objectUrl, name: fileName });
                    } catch (error) {
                        console.error("Error cargando imagen:", error);
                    }
                }

                if (files.length > 0) {
                    startBtn.disabled = false;
                    startBtn.textContent = `Iniciar (${files.length} imgs)`;
                }
            }
        }

        // --- LÓGICA DE CARGA LOCAL ---
        document.getElementById('local-input').onchange = (e) => {
            const localFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            
            // Añadir al array existente por si quieren combinar Local + Drive
            localFiles.forEach(f => {
                files.push({ url: URL.createObjectURL(f), name: f.name });
            });
            
            if(files.length) {
                startBtn.disabled = false;
                startBtn.textContent = `Iniciar (${files.length} imgs)`;
            }
        };

        // --- LÓGICA DE LA SESIÓN ---
        startBtn.onclick = () => {
            document.getElementById('control-panel').style.display = 'none';
            document.getElementById('stats-overlay').style.display = 'block';
            progressContainer.style.display = 'block';
            currentIndex = 0;
            sessionStartTime = Date.now();
            startSession();
        };

        function startSession() {
            showImage();
            sessionInterval = setInterval(updateSessionTime, 1000);
        }

        function showImage() {
            if (currentIndex >= files.length) return endSession();
            
            imgElement.src = files[currentIndex].url;
            imgElement.style.display = 'block';
            document.getElementById('img-count').textContent = `${currentIndex + 1}/${files.length}`;
            
            imageStartTime = Date.now();
            const duration = parseInt(document.getElementById('time-select').value) * 1000;
            
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                let elapsed = Date.now() - imageStartTime;
                let pct = (elapsed / duration) * 100;
                progressBar.style.width = pct + '%';
                if (elapsed >= duration) {
                    currentIndex++;
                    showImage();
                }
            }, 50);
        }

        function updateSessionTime() {
            let diff = Math.floor((Date.now() - sessionStartTime) / 1000);
            let m = Math.floor(diff / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('total-time').textContent = `${m}:${s}`;
        }

        function endSession() {
            clearInterval(progressInterval);
            clearInterval(sessionInterval);
            alert("¡Sesión de dibujo terminada!");
            location.reload();
        }
    </script>
</body>
</html>
